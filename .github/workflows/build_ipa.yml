name: Build iOS Unsigned IPA (Raw Xcodebuild)

on: [workflow_dispatch]

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: 📥 Скачивание кода проекта
        uses: actions/checkout@v4

      - name: 🐦 Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Установка зависимостей пакетов
        run: flutter pub get

      - name: 🍏 Фикс Bundle ID в ядре Flutter
        run: |
          # Жестко меняем com.example на нормальный ID прямо в исходнике конфигурации
          sed -i '' 's/com.example.animix/app.animix.ios/g' ios/Flutter/AppInfo.xcconfig

      - name: ⚙️ Генерация файлов Xcode (без попытки сборки)
        run: flutter build ios --config-only

      - name: 🍏 Установка CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: 🔨 Прямая сборка через xcodebuild (Обход Flutter CLI)
        run: |
          cd ios
          # Вызываем нативный компилятор Apple и передаем ему флаги напрямую
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$(PWD)/../build/ios" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            DEVELOPMENT_TEAM="" \
            build

      - name: 📦 Упаковка в файл .ipa
        run: |
          # Путь изменился, так как xcodebuild кладет файлы немного иначе
          cd build/ios/Release-iphoneos/
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r Animix.ipa Payload

      - name: 🚀 Загрузка готового файла
        uses: actions/upload-artifact@v4
        with:
          name: Animix_iOS_App
          path: build/ios/Release-iphoneos/Animix.ipa
          retention-days: 7
