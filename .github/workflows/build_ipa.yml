name: Build iOS Unsigned ipa

# 🔥 Бронебойный триггер: позволяет запускать сборку вручную по кнопке на сайте GitHub
on: [workflow_dispatch]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: 📥 Скачивание кода твоего проекта
        uses: actions/checkout@v4

      - name: 🐦 Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Установка зависимостей пакетов
        run: flutter pub get

      - name: 🕵️ Магия обхода блокировки Flutter (Fake Security)
        run: |
          # Flutter жестко блокирует сборку (даже --config-only) до запуска Xcode, 
          # если в системе физически нет сертификата. Создаем фейк!
          mkdir -p $HOME/fake_bin
          cat << 'EOF' > $HOME/fake_bin/security
          #!/bin/bash
          if [[ "$*" == *"find-identity"* ]]; then
            echo "  1) 1234567890ABCDEF1234567890ABCDEF12345678 \"Apple Development: Fake\""
            echo "     1 valid identities found"
            exit 0
          fi
          exec /usr/bin/security "$@"
          EOF
          chmod +x $HOME/fake_bin/security
          echo "$HOME/fake_bin" >> $GITHUB_PATH

      - name: 🍎 Отключение подписи во Xcode (Надежный Ruby Xcodeproj)
        run: |
          # Заставляем Flutter сгенерировать недостающие iOS-файлы
          flutter build ios --config-only
          
          # Ставим официальную библиотеку для управления проектами Xcode
          gem install xcodeproj
          
          # Программно и жестко выключаем подпись прямо в настройках проекта
          cat << 'EOF' > patch_xcode.rb
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
          
          # Проходимся по всем целям (Targets) и конфигурациям (Debug/Release)
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGN_IDENTITY'] = ''
              config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              config.build_settings['DEVELOPMENT_TEAM'] = ''
              config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
              
              # Заодно фиксим com.example, который блокирует Apple
              if config.build_settings['PRODUCT_BUNDLE_IDENTIFIER']&.include?('com.example')
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'app.animix.ios'
              end
            end
          end
          
          # Отключаем автоматическую подпись на уровне всего проекта
          if project.root_object.attributes['TargetAttributes']
            project.root_object.attributes['TargetAttributes'].each do |_, attributes|
              attributes['ProvisioningStyle'] = 'Manual'
            end
          end
          
          project.save
          EOF
          ruby patch_xcode.rb
          rm patch_xcode.rb

      - name: 🍏 Авто-патч Podfile и установка CocoaPods
        run: |
          cd ios
          # Внедряем фикс сертификатов в плагины
          cat << 'EOF' > patch_podfile.rb
          text = File.read('Podfile')
          text = text.gsub(/flutter_additional_ios_build_settings\(target\)/, "flutter_additional_ios_build_settings(target)\n    target.build_configurations.each do |config|\n      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n      config.build_settings['CODE_SIGN_IDENTITY'] = ''\n      config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''\n      config.build_settings['DEVELOPMENT_TEAM'] = ''\n    end")
          File.write('Podfile', text)
          EOF
          ruby patch_podfile.rb
          rm patch_podfile.rb
          
          # Устанавливаем плагины iOS
          pod install --repo-update

      - name: 🔨 Сборка iOS приложения без подписи
        run: flutter build ios --release --no-codesign

      - name: 📦 Упаковка в файл .ipa
        run: |
          cd build/ios/iphoneos/
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r Animix.ipa Payload

      - name: 🚀 Загрузка готового файла
        uses: actions/upload-artifact@v4
        with:
          name: Animix_iOS_App
          path: build/ios/iphoneos/Animix.ipa
          retention-days: 7
