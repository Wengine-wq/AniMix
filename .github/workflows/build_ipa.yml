# 🔥 Бронебойный триггер: позволяет запускать сборку вручную по кнопке на сайте GitHub
on: [workflow_dispatch]

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: 📥 Скачивание кода твоего проекта
        uses: actions/checkout@v4

      - name: 🐦 Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Установка зависимостей пакетов
        run: flutter pub get

      - name: 🕵️ Магия обхода блокировки Flutter (Fake Security)
        run: |
          # Flutter жестко блокирует сборку до запуска Xcode, если в системе физически нет сертификата.
          # Создаем фейковую системную команду, чтобы обмануть Flutter!
          mkdir -p $HOME/fake_bin
          cat << 'EOF' > $HOME/fake_bin/security
          #!/bin/bash
          if [[ "$*" == *"find-identity"* ]]; then
            echo "  1) 1234567890ABCDEF1234567890ABCDEF12345678 \"Apple Development: Fake\""
            echo "     1 valid identities found"
            exit 0
          fi
          exec /usr/bin/security "$@"
          EOF
          chmod +x $HOME/fake_bin/security
          echo "$HOME/fake_bin" >> $GITHUB_PATH

      - name: 🍎 Отключение проверки сертификатов во Xcode (Часть 1)
        run: |
          # Меняем com.example на нормальный, так как Apple блокирует example
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/com.example.animix/app.animix.ios/g' {} +
          
          # Заставляем Flutter сгенерировать недостающие iOS-файлы
          flutter build ios --config-only
          
          # Жестко вырезаем все упоминания сертификатов из файла проекта Xcode
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*";/CODE_SIGN_IDENTITY = "";/g' {} +
          find ios -type f -name "project.pbxproj" -exec sed -i '' '/DEVELOPMENT_TEAM/d' {} +
          
          # Дописываем железные правила в конфиг Flutter
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: 🍏 Авто-патч Podfile и установка CocoaPods (Часть 2)
        run: |
          cd ios
          # Внедряем фикс сертификатов прямо в сгенерированный Podfile
          awk '/flutter_additional_ios_build_settings\(target\)/ { print; print "    target.build_configurations.each do |config|\n      config.build_settings[\x27CODE_SIGNING_ALLOWED\x27] = \x27NO\x27\n      config.build_settings[\x27CODE_SIGNING_REQUIRED\x27] = \x27NO\x27\n      config.build_settings[\x27CODE_SIGN_IDENTITY\x27] = \x27-\x27\n      config.build_settings[\x27EXPANDED_CODE_SIGN_IDENTITY\x27] = \x27-\x27\n    end"; next }1' Podfile > Podfile.tmp && mv Podfile.tmp Podfile
          
          # Устанавливаем плагины
          pod install --repo-update

      - name: 🔨 Сборка iOS приложения без подписи
        run: flutter build ios --release --no-codesign

      - name: 📦 Упаковка в файл .ipa
        run: |
          cd build/ios/iphoneos/
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r Animix.ipa Payload

      - name: 🚀 Загрузка готового файла
        uses: actions/upload-artifact@v4
        with:
          name: Animix_iOS_App
          path: build/ios/iphoneos/Animix.ipa
          retention-days: 7
