name: Build iOS Unsigned IPA (Raw Xcodebuild)

on: [workflow_dispatch]

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: 📥 Скачивание кода проекта
        uses: actions/checkout@v4

      - name: 🐦 Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Установка зависимостей пакетов
        run: flutter pub get

      - name: 📝 Восстановление .env из загруженного файла
        run: |
          # Ищем env_file именно в корне проекта и делаем из него скрытый .env
          if [ -f "env_file" ]; then
            mv env_file .env
            echo "✅ Файл env_file найден в корне и переименован в .env"
          else
            echo "⚠️ Файл env_file не найден в корне! Создаем пустую заглушку."
            touch .env
          fi

      - name: ⚙️ Генерация файлов Xcode
        run: flutter build ios --config-only --no-codesign

      - name: 🍏 Установка CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: 🔨 Прямая сборка через xcodebuild
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$(PWD)/../build/ios" \
            PRODUCT_BUNDLE_IDENTIFIER="app.animix.ios" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            DEVELOPMENT_TEAM="" \
            build

      - name: 📦 Упаковка в файл .ipa
        run: |
          cd build/ios/Release-iphoneos/
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r Animix.ipa Payload

      - name: 🚀 Загрузка готового файла
        uses: actions/upload-artifact@v4
        with:
          name: Animix_iOS_App
          path: build/ios/Release-iphoneos/Animix.ipa
          retention-days: 7
