name: Build iOS Unsign

on: [workflow_dispatch]

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: 📥 Скачивание кода твоего проекта
        uses: actions/checkout@v4

      - name: 🐦 Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Установка зависимостей пакетов
        run: flutter pub get

      - name: ⚙️ Генерация конфигурационных файлов iOS
        run: flutter build ios --config-only

      - name: 🍎 Жесткое отключение подписи Xcode (Manual Mode)
        run: |
          # 1. Переводим проект в ручной режим (иначе Xcode всегда будет лезть на сервер Apple)
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. Физически удаляем упоминания команды разработчиков из файла проекта
          sed -i '' '/DevelopmentTeam/d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' '/DEVELOPMENT_TEAM/d' ios/Runner.xcodeproj/project.pbxproj
          
          # 3. Меняем com.example, который блокируется Apple
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/com.example.animix/app.animix.ios/g' {} +
          
          # 4. Жестко вписываем правила "БЕЗ ПОДПИСИ" в базовый конфиг Flutter.
          # Этот файл не перезаписывается при сборке, поэтому параметры на 100% дойдут до Xcode.
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig

      - name: 🍏 Авто-патч Podfile и установка CocoaPods
        run: |
          cd ios
          # Внедряем отключение подписи прямо в настройки плагинов iOS
          cat << 'EOF' > patch_podfile.rb
          text = File.read('Podfile')
          text = text.gsub(/flutter_additional_ios_build_settings\(target\)/, "flutter_additional_ios_build_settings(target)\n    target.build_configurations.each do |config|\n      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n      config.build_settings['CODE_SIGN_IDENTITY'] = ''\n      config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''\n      config.build_settings['DEVELOPMENT_TEAM'] = ''\n    end")
          File.write('Podfile', text)
          EOF
          ruby patch_podfile.rb
          rm patch_podfile.rb
          
          # Скачиваем плагины
          pod install --repo-update

      - name: 🔨 Сборка iOS приложения без подписи
        run: flutter build ios --release --no-codesign

      - name: 📦 Упаковка в файл .ipa
        run: |
          cd build/ios/iphoneos/
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r Animix.ipa Payload

      - name: 🚀 Загрузка готового файла
        uses: actions/upload-artifact@v4
        with:
          name: Animix_iOS_App
          path: build/ios/iphoneos/Animix.ipa
          retention-days: 7
