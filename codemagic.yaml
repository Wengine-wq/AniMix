workflows:
  ios-unsigned-sideload:
    name: iOS Unsigned IPA (Для Sideloadly / AltStore / TrollStore)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Получение зависимостей Flutter
        script: |
          flutter packages pub get
      - name: Установка CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Сборка iOS приложения без подписи (No Codesign)
        script: |
          flutter build ios --release --no-codesign
      - name: Упаковка Runner.app в .ipa файл
        script: |
          # Переходим в директорию сборки
          cd build/ios/iphoneos/
          
          # Создаем структуру Payload, необходимую для формата .ipa
          mkdir -p Payload
          
          # Перемещаем собранное приложение в Payload
          mv Runner.app Payload/
          
          # Архивация в формат .ipa
          zip -qq -r Animix_Unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/Animix_Unsigned.ipa
    publishing:
      email:
        recipients:
          - mr.hilaev.fu@gmail.com # Замени на свою почту, туда придет ссылка на скачивание
        notify:
          success: true
          failure: true