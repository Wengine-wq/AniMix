workflows:
  ios-unsigned-sideload:
    name: iOS Unsigned IPA (Для Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Получение зависимостей Flutter
        script: |
          flutter packages pub get
          
      - name: Жесткое отключение проверки сертификатов и Apple Team
        script: |
          # 1. Меняем дефолтный Bundle ID, так как Apple ненавидит com.example
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/com.example.animix/app.animix.ios/g' {} +
          
          # 2. Вырезаем любые требования Development Team прямо из файла проекта Xcode
          find ios -type f -name "project.pbxproj" -exec sed -i '' '/DevelopmentTeam/d' {} +
          find ios -type f -name "project.pbxproj" -exec sed -i '' '/DEVELOPMENT_TEAM/d' {} +
          
          # 3. Вписываем железные правила сборки без сертификата в конфиг Flutter
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          
      - name: Установка CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
          
      - name: Сборка iOS приложения без подписи (No Codesign)
        script: |
          flutter build ios --release --no-codesign
          
      - name: Упаковка Runner.app в .ipa файл
        script: |
          cd build/ios/iphoneos/
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r Animix_Unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/Animix_Unsigned.ipa
    publishing:
      email:
        recipients:
          - mr.hilaev.fu@gmail.com
        notify:
          success: true
          failure: true