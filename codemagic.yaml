workflows:
  ios-unsigned-sideload:
    name: iOS Unsigned IPA (Для Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # 🔥 ГЛОБАЛЬНЫЙ ФИКС: Принудительно отключаем подпись для всего Workspace (включая плагины)
      vars:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
    scripts:
      - name: Получение зависимостей Flutter
        script: |
          flutter packages pub get
          
      - name: Фикс Bundle ID (Apple блокирует com.example)
        script: |
          # Автоматически меняем дефолтный айдишник на рабочий, чтобы Xcode не ругался
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/com.example.animix/app.animix.ios/g' {} +
          
      - name: Установка CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
          
      - name: Сборка iOS приложения без подписи (No Codesign)
        script: |
          flutter build ios --release --no-codesign
          
      - name: Упаковка Runner.app в .ipa файл
        script: |
          cd build/ios/iphoneos/
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r Animix_Unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/Animix_Unsigned.ipa
    publishing:
      email:
        recipients:
          - mr.hilaev.fu@gmail.com # ⚠️ Не забудь вписать сюда свою почту перед коммитом!
        notify:
          success: true
          failure: true